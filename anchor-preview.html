<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>錨定模式預覽 — pose-coach</title>
<style>
  :root { --bg:#111418; --panel:#1c2128; --line:#2d333b; --txt:#e6edf3; --dim:#8b949e; --aqua:#2dd4bf; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--txt); font-family:"PingFang TC","Microsoft JhengHei",sans-serif; min-height:100vh; }
  header { padding:14px 18px 6px; }
  header h1 { font-size:18px; }
  header p { font-size:12px; color:var(--dim); margin-top:4px; }
  .wrap { display:flex; flex-wrap:wrap; gap:14px; padding:14px 18px; justify-content:center; }
  .stage { position:relative; }
  canvas#cv { background:#000; border-radius:12px; display:block; }
  .side { width:300px; max-width:95vw; display:flex; flex-direction:column; gap:12px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px; }
  .card h2 { font-size:13px; color:var(--dim); margin-bottom:8px; font-weight:600; }
  select { width:100%; padding:8px; background:#0d1117; color:var(--txt); border:1px solid var(--line); border-radius:8px; font-size:14px; }
  .thumbs { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; max-height:220px; overflow-y:auto; }
  .thumbs canvas { width:100%; background:#0d1117; border:1px solid var(--line); border-radius:6px; cursor:pointer; }
  .thumbs canvas.sel { border-color:var(--aqua); box-shadow:0 0 0 1px var(--aqua); }
  label.tg { display:flex; align-items:center; gap:8px; font-size:14px; padding:5px 0; cursor:pointer; }
  label.tg input { accent-color:var(--aqua); width:16px; height:16px; }
  .hint { font-size:13px; line-height:1.7; }
  .hint b { color:var(--aqua); }
  .tag { display:inline-block; font-size:11px; border:1px solid var(--line); border-radius:99px; padding:1px 8px; color:var(--dim); margin-left:6px; }
</style>
</head>
<body>
<header>
  <h1>錨定模式預覽 <span class="tag">③ mini</span></h1>
  <p>骨架固定在課程示範照的「站位＋佔比」上 — 拍攝時人走進框裡對齊,構圖與姿勢一次到位。</p>
</header>
<div class="wrap">
  <div class="stage"><canvas id="cv" width="1080" height="1920" style="width:324px;height:576px"></canvas></div>
  <div class="side">
    <div class="card">
      <h2>場景</h2>
      <select id="scene"></select>
      <h2 style="margin-top:10px">模板(點選切換)</h2>
      <div class="thumbs" id="thumbs"></div>
    </div>
    <div class="card">
      <h2>圖層</h2>
      <label class="tg"><input type="checkbox" id="lyPose" checked>錨定殘影(剪影+骨架)</label>
      <label class="tg"><input type="checkbox" id="lyComp" checked>美感構圖層(三分格・眼睛線)</label>
      <label class="tg"><input type="checkbox" id="lyReel">Reels 安全區層(構圖卡座標)</label>
    </div>
    <div class="card">
      <h2>構圖檢核(自動)</h2>
      <div class="hint" id="hint">—</div>
    </div>
  </div>
</div>
<script>
// 只畫軀幹四肢;臉部 11 點與手指端點不連線(小尺寸下會變亂線),頭部另以圓表示
const CONN = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],
  [23,24],[23,25],[24,26],[25,27],[26,28]];
// 手掌方向短線(腕→掌指中點)與腳掌三角(踝-跟-趾)
const HANDS = [[15,17,19],[16,18,20]], FEET = [[27,29,31],[28,30,32]];
const mid = (a, b) => [(a[0]+b[0])/2, (a[1]+b[1])/2];
// 頭圓:圓心 = 雙耳中點,半徑 = 肩寬 × 0.36
function headCircle(pts) {
  const cx = (pts[7][0] + pts[8][0]) / 2, cy = (pts[7][1] + pts[8][1]) / 2;
  const r = Math.hypot(pts[11][0] - pts[12][0], pts[11][1] - pts[12][1]) * 0.36;
  return [cx, cy, r];
}
const W = 1080, H = 1920;
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let DATA = {}, cur = null;

fetch('templates.json').then(r => r.json()).then(d => {
  DATA = d;
  const sel = document.getElementById('scene');
  Object.keys(d).forEach(s => sel.add(new Option(`${s}(${d[s].length})`, s)));
  sel.onchange = () => pickScene(sel.value);
  pickScene(sel.value);
});

function pickScene(scene) {
  const box = document.getElementById('thumbs');
  box.innerHTML = '';
  DATA[scene].forEach((t, i) => {
    const c = document.createElement('canvas');
    c.width = 90; c.height = 160; c.title = t.id;
    drawThumb(c, t);
    c.onclick = () => { box.querySelectorAll('canvas').forEach(x => x.classList.remove('sel')); c.classList.add('sel'); pick(t); };
    box.appendChild(c);
    if (i === 0) { c.classList.add('sel'); pick(t); }
  });
}

function pick(t) { cur = t; render(); }
['lyPose','lyComp','lyReel'].forEach(id => document.getElementById(id).onchange = render);

// 錨定映射:源圖 px → 畫布。等比縮放 s = H/h_img(人物相對高度不變),髖中點釘在 comp.hip 的畫布位置
function mapper(t) {
  const [iw, ih] = t.comp.img_wh, s = H / ih;
  const hip = [t.comp.hip[0] * W, t.comp.hip[1] * H];
  const hipSrc = [t.comp.hip[0] * iw, t.comp.hip[1] * ih];
  return p => [hip[0] + (p[0] * iw - hipSrc[0]) * s, hip[1] + (p[1] * ih - hipSrc[1]) * s];
}

function drawSkeleton(g, t, m, lw) {
  const pts = t.lm.map(m);
  g.lineWidth = lw; g.lineCap = 'round';
  g.strokeStyle = 'rgba(45,212,191,.9)'; g.fillStyle = 'rgba(45,212,191,.9)';
  g.shadowColor = 'rgba(45,212,191,.5)'; g.shadowBlur = lw * 2;
  CONN.forEach(([a, b]) => { g.beginPath(); g.moveTo(...pts[a]); g.lineTo(...pts[b]); g.stroke(); });
  // 手掌方向與腳掌三角(A 風格細節)
  HANDS.forEach(([w, p, i]) => { const f = mid(pts[p], pts[i]);
    g.beginPath(); g.moveTo(...pts[w]); g.lineTo(...f); g.stroke();
    g.beginPath(); g.arc(f[0], f[1], lw * .8, 0, 7); g.fill(); });
  FEET.forEach(([a, h, t]) => { g.beginPath(); g.moveTo(...pts[a]);
    g.lineTo(...pts[h]); g.lineTo(...pts[t]); g.closePath(); g.stroke(); });
  // 只在肢體關節畫點(肩肘腕髖膝踝)
  [11,12,13,14,15,16,23,24,25,26,27,28].forEach(i => {
    g.beginPath(); g.arc(pts[i][0], pts[i][1], lw * .9, 0, 7); g.fill(); });
  const [hx2, hy2, hr] = headCircle(pts);
  g.beginPath(); g.arc(hx2, hy2, hr, 0, 7); g.stroke();
  // 脖子:頭圓底 → 肩中點
  g.beginPath(); g.moveTo(hx2, hy2 + hr);
  g.lineTo((pts[11][0] + pts[12][0]) / 2, (pts[11][1] + pts[12][1]) / 2); g.stroke();
  g.shadowBlur = 0;
}

function drawThumb(c, t) {
  const g = c.getContext('2d');
  const xs = t.lm.map(p => p[0]), ys = t.lm.map(p => p[1]);
  const x0 = Math.min(...xs), x1 = Math.max(...xs), y0 = Math.min(...ys), y1 = Math.max(...ys);
  const s = Math.min(c.width * .7 / (x1 - x0 + 1e-6), c.height * .82 / (y1 - y0 + 1e-6));
  const m = p => [(p[0] - (x0 + x1) / 2) * s + c.width / 2, (p[1] - (y0 + y1) / 2) * s + c.height / 2];
  const pts = t.lm.map(m);
  // B 素描人偶:軀幹面 + 粗細不一的膠囊肢體 + 手腳形狀 + 關節鉚釘
  const u = Math.max((y1 - y0) * s * 0.016, 1.6);
  const col = '#79c3b4';
  g.fillStyle = col; g.strokeStyle = col; g.lineCap = 'round';
  g.beginPath(); [11,12,24,23].forEach((i, k) => k ? g.lineTo(...pts[i]) : g.moveTo(...pts[i]));
  g.closePath(); g.fill();
  const limbs = [[11,13,3],[13,15,2.2],[12,14,3],[14,16,2.2],
                 [23,25,3.6],[25,27,2.6],[24,26,3.6],[26,28,2.6]];
  limbs.forEach(([a, b, k]) => { g.lineWidth = u * k;
    g.beginPath(); g.moveTo(...pts[a]); g.lineTo(...pts[b]); g.stroke(); });
  HANDS.forEach(([w, p, i]) => { const f = mid(pts[p], pts[i]), c2 = mid(pts[w], f);
    const ang = Math.atan2(f[1] - pts[w][1], f[0] - pts[w][0]);
    g.beginPath(); g.ellipse(c2[0], c2[1], u * 1.6, u * 0.9, ang, 0, 7); g.fill(); });
  FEET.forEach(([a, h, t2]) => { g.beginPath(); g.moveTo(...pts[a]);
    g.lineTo(...pts[h]); g.lineTo(...pts[t2]); g.closePath(); g.fill(); });
  const [hx, hy, hr] = headCircle(pts);
  g.beginPath(); g.arc(hx, hy, hr, 0, 7); g.fill();
  g.lineWidth = u * 2; g.beginPath(); g.moveTo(hx, hy);
  g.lineTo((pts[11][0] + pts[12][0]) / 2, (pts[11][1] + pts[12][1]) / 2); g.stroke();
  g.fillStyle = '#22343c';
  [11,12,13,14,23,24,25,26].forEach(i => {
    g.beginPath(); g.arc(pts[i][0], pts[i][1], Math.max(u * .55, 1), 0, 7); g.fill(); });
}

function render() {
  if (!cur) return;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);

  if (document.getElementById('lyReel').checked) drawReelSafe();
  if (document.getElementById('lyComp').checked) drawCompGuide();
  if (document.getElementById('lyPose').checked) drawGhost(cur);
  hint();
}

// C 剪影殘影:遮罩染色 + 輪廓光 + 細骨架
const maskCache = {};
function tinted(img, color) {
  const off = document.createElement('canvas');
  off.width = img.naturalWidth; off.height = img.naturalHeight;
  const og = off.getContext('2d');
  og.drawImage(img, 0, 0);
  og.globalCompositeOperation = 'source-in';
  og.fillStyle = color; og.fillRect(0, 0, off.width, off.height);
  return off;
}
function drawGhost(t) {
  const m = mapper(t);
  if (t.mask) {
    let img = maskCache[t.mask];
    if (!img) {
      img = new Image();
      img.onload = () => { if (cur === t) render(); };
      img.src = t.mask; maskCache[t.mask] = img;
    }
    if (img.complete && img.naturalWidth) {
      const [x0, y0] = m([0, 0]), [x1, y1] = m([1, 1]);
      const w2 = x1 - x0, h2 = y1 - y0;
      const glow = tinted(img, 'rgba(45,212,191,.9)');
      [[-4,0],[4,0],[0,-4],[0,4],[-3,-3],[3,3],[-3,3],[3,-3]]
        .forEach(([dx, dy]) => ctx.drawImage(glow, x0 + dx, y0 + dy, w2, h2));
      ctx.globalAlpha = .92;
      ctx.drawImage(tinted(img, '#274f58'), x0, y0, w2, h2);
      ctx.globalAlpha = 1;
    }
  }
  drawSkeleton(ctx, t, m, t.mask ? 5 : 10);
}

// 美感構圖層:三分格 + 模板眼睛線 + 頂部留白帶
function drawCompGuide() {
  ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.lineWidth = 3; ctx.setLineDash([]);
  [W / 3, W * 2 / 3].forEach(x => { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); });
  [H / 3, H * 2 / 3].forEach(y => { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); });
  // 模板實際眼睛線
  const ey = cur.comp.eye_y * H;
  ctx.strokeStyle = 'rgba(250,204,21,.85)'; ctx.lineWidth = 4; ctx.setLineDash([18, 12]);
  ctx.beginPath(); ctx.moveTo(0, ey); ctx.lineTo(W, ey); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(250,204,21,.9)'; ctx.font = '30px sans-serif';
  ctx.fillText('模板眼睛線', 24, ey - 14);
}

// Reels 安全區層:templates/shooting 構圖卡座標(1080×1920)
function drawReelSafe() {
  const zone = (x, y, w, h, color, label) => {
    ctx.fillStyle = color; ctx.fillRect(x, y, w, h);
    if (label) { ctx.fillStyle = 'rgba(255,255,255,.75)'; ctx.font = '28px sans-serif'; ctx.fillText(label, x + 16, y + 40); }
  };
  zone(0, 0, W, 250, 'rgba(239,68,68,.18)', '頂部禁區');
  zone(0, 270, W, 150, 'rgba(250,204,21,.15)', '標題區');
  zone(0, 1280, W, 120, 'rgba(59,130,246,.18)', '字幕區');
  zone(900, 850, 180, 670, 'rgba(239,68,68,.18)', 'rail');
  zone(0, 1520, W, 400, 'rgba(239,68,68,.18)', '底部禁區');
  ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 2;
  ctx.strokeRect(40, 40, W - 80, H - 80); // 裁切 buffer
}

// 構圖檢核:用 comp 欄位對照規則,輸出可執行的提示
function hint() {
  const c = cur.comp, out = [];
  const eyeDiff = c.eye_y - 1 / 3;
  out.push(`眼睛線 y=${c.eye_y.toFixed(2)},` + (Math.abs(eyeDiff) < .06
    ? ' <b>壓在上 1/3 線 ✓</b>'
    : eyeDiff > 0 ? ` 低於三分線 ${(eyeDiff * 100).toFixed(0)}% — 鏡頭放低或人往前` : ` 高於三分線 ${(-eyeDiff * 100).toFixed(0)}% — 鏡頭抬高一點`));
  const bh = c.bbox[3] - c.bbox[1];
  out.push(`人物佔畫面高 <b>${(bh * 100).toFixed(0)}%</b>(${cur.full ? '全身' : '半身'}模板)`);
  out.push(`站位:髖中點 x=${c.hip[0].toFixed(2)}` + (c.hip[0] < .38 ? '(偏左構圖)' : c.hip[0] > .62 ? '(偏右構圖)' : '(置中構圖)'));
  if (c.bbox[1] < 250 / 1920) out.push(`⚠ 頭部進入 Reels 頂部禁區 — 拍 Reel 素材時人再往下站`);
  document.getElementById('hint').innerHTML = out.map(s => '・' + s).join('<br>');
}
</script>
</body>
</html>
